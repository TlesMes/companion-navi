# 값은 튜닝 대상, 구조는 확정 (01 문서 7장)

brain:
  # 두뇌 교체는 vendor 한 줄 — 모델은 아래 맵에서 벤더에 맞는 것이 자동 선택된다.
  #   gemini    → 기본값. 보유 키 기준 (D1은 보류 — 어댑터로 교체 자유)
  #   anthropic → 키 확보 시 교체 검증 (Phase 1 완료 기준 2)
  #   echo      → 키 없이 파이프라인 검증용 가짜 두뇌
  vendor: gemini
  models:
    # 2.5-flash는 멍청하다는 실사용 피드백으로 한 세대 상향 (2026.06.13 TTFT 실측:
    # 3-flash-preview+thinking끔 1.1초 / 3.5-flash는 무료 티어에서 4~93초라 보류)
    gemini: gemini-3-flash-preview
    anthropic: claude-haiku-4-5-20251001   # 잡담 티어 — 티어 분리(깊은 대화 승격)는 이후 Phase
    echo: echo

mouth:
  # TTS 교체는 vendor 한 줄(또는 실행 시 CLI --mouth) — 벤더별 설정·음색은 같은 이름의
  # 하위 섹션에서 읽는다. 두 벤더 섹션을 항상 공존시켜 두면 config 수정 없이 무중단 교체된다.
  #   fake       → 스피커·모델 없이 파이프라인 검증용
  #   supertonic → 고정 프리셋(F1 등), voice_id가 음색 이름
  #   gptsovits  → D3 확정. voice_id가 레퍼런스 wav 경로(ref_text와 짝)
  vendor: supertonic                # 한국어 기본. 실험은 config 건드리지 말고 CLI --mouth 로.
  voice:
    name: navi                      # 논리적 정체성 — 벤더 갈아껴도 같으면 "같은 목소리"
    speed: 1.0
  supertonic:                       # vendor가 supertonic일 때만 읽힘 → create_mouth kwargs
    voice_id: F1                    # 음색 프리셋 이름 — 파일 경로 아님
    model: supertonic-3
    lang: ko
    total_steps: 8
  gptsovits:                        # vendor가 gptsovits일 때만 읽힘
    # ⚠ 음색·톤은 페르소나 번들 소유(2026.07.10 결정) — 카드에 voice: 섹션이 있으면
    # 가중치·레퍼런스·언어는 카드 값이 이긴다(personas/aris.yaml 참조). 아래 voice_id/
    # ckpt/ref_*는 voice 섹션 없는 카드용 폴백. repo_path(엔진 위치)만 항상 여기.
    voice_id: dataset/arisu/wavs/Arisu_Maid_LogIn_1.wav  # 폴백 레퍼런스 wav(ref_text와 한 쌍)
    repo_path: C:\gptsovits         # ASCII 경로 (GPT-SoVITS repo)
    gpt_ckpt: voice_ref/arisu-e15.ckpt
    sovits_ckpt: voice_ref/arisu_e8_s352.pth
    ref_text: おかえりなさいませ、ご主人様！メイドのアリスに何でもお任せください。
    ref_lang: ja                    # 레퍼런스 음원 언어
    gen_lang: ja                    # 합성 출력 언어 (한국어 ref 확보 시 ko)

ear:
  # 웨이크워드(D7) — SLEEP에선 STT를 끄고 파형에서 호출어만 잡는다(arch 5.1·D16).
  # CLI --wakeword 줄 때만 청취축이 켜진다. 모델 없이도 데몬은 뜨고, --wakeword만 막힌다.
  wakeword:
    # openwakeword(채택, 오프라인 음향 KWS·계정없음) | vosk(ASR 스팟팅·한국어 약함) | porcupine(보존)
    engine: openwakeword
    active_timeout_ms: 30000    # 깨어난 뒤 이만큼 무음이면 다시 SLEEP
    openwakeword:
      # 한국어 커스텀 모델(.onnx) — livekit-wakeword로 학습, 원어민 마이크 실측 통과(D7).
      model_path: secrets/navi_ko.onnx
      # model_name: hey_jarvis  # 내장 영어 모델 — model_path 없을 때의 대안.
      threshold: 0.5            # 0~1, 높을수록 엄격(오수락↓·누락↑)
      vad_threshold: 0          # 0=끔(기본). >0이면 Silero VAD가 비음성 출력을 억제(오탐↓). 단
                                # 연산은 안 줄임 — VAD는 풀 추론 "뒤"에 결과를 거를 뿐, 오히려 ~1% 더 씀.
    vosk:                       # ASR 기반 스팟팅(보존). keywords에 호출어 문구(포함 매칭).
      model_path: secrets/vosk-model-small-ko       # alphacephei.com/vosk/models, secrets/에 압축 해제
      keywords: ["야 일어나", "여 일어나", "예 일어나"]
    porcupine:                  # 보존 — Picovoice 무료 종료(2026-06-30)·가입 장벽으로 사실상 폐기
      keyword_path: secrets/navi_ko.ppn
      model_path: secrets/porcupine_params_ko.pv
      sensitivity: 0.5

mode:
  # 능동축(arch 5장, D16) 기본값 — GUI(Phase 3 순서 3)가 생기면 런타임 변경 예정.
  # 취침창 안에서는 나비가 절대 먼저 말 걸지 않는다(검문②). 응답은 모드 무관 항상 됨.
  sleep_window:
    start: "23:00"      # 취침창 진입 → SLEEP (자정 넘김 지원)
    end: "07:00"        # 기상 → ACTIVE 복귀
  snooze_minutes: 30    # "더 잘래" 유예 — 재발화 시 30분씩 연장

proactive:
  # 능동 발화 타이밍(arch 4.4 2층, Phase 3 순서 4) — 나비가 "먼저" 말 거는 리듬.
  # ⚠ 아래 값은 전부 배선용 대충값이다. 좋은 값은 종이로 못 정한다(진행 원칙 2) —
  # interaction_log가 쌓인 뒤 응답률·무시율을 보고 튜닝하는 게 후속 작업.
  # 산식 = tick 기반 hazard(변동확률): 마지막 상호작용 후 오래될수록 매 tick 발화 확률↑.
  # 무작위성이 산식에 내장돼 tick 빈도와 무관하게 발화 시점 분포가 같다 → jitter_range 폐지.
  base_interval_s: 3600     # hazard 척도 λ의 기준(가중치 전). k=2에서 평균 발화 ≈ 0.89λ
  min_gap_s: 1800           # 능동 발화 사이 최소 간격 — 이 안이면 확률 0(하드 바닥)
  daily_cap: 8              # 하루 최대 능동 발화 횟수 (원가·피로 방지)
  hazard_shape_k: 2.0       # Weibull shape. 1=무기억(언제든 같은 확률), >1=경과할수록 확률↑
  time_weights:             # 시간대 → 가중치(클수록 자주 건다). time_of_day 버킷과 짝.
    morning: 1.2
    afternoon: 1.0
    evening: 1.1
    night: 0.5

control:
  # 컨트롤 플레인(Stage 15) — 데몬 안 HTTP/WS 서버, GUI(별도 프로세스)의 관찰·제어 통로.
  # 바인딩은 127.0.0.1 고정(설정 불가) — localhost 밖 노출 없음.
  enabled: true
  port: 8765

db:
  path: navi.db

memory:
  recent_turns: 20      # 단기기억 인출 턴 수 (장기기억은 Phase 4)

persona:
  # 인격 교체는 이 한 줄. navi.yaml = 나비 한국어 기본 페르소나.
  # supertonic.lang은 ko라 응답·음성 모두 한국어로 일치.
  card_path: personas/navi.yaml

# 값은 튜닝 대상, 구조는 확정 (01 문서 7장)

brain:
  # 두뇌 교체는 vendor 한 줄 — 모델은 아래 맵에서 벤더에 맞는 것이 자동 선택된다.
  #   gemini    → 기본값. 보유 키 기준 (D1은 보류 — 어댑터로 교체 자유)
  #   anthropic → 키 확보 시 교체 검증 (Phase 1 완료 기준 2)
  #   echo      → 키 없이 파이프라인 검증용 가짜 두뇌
  vendor: gemini
  models:
    # 2.5-flash는 멍청하다는 실사용 피드백으로 한 세대 상향 (2026.06.13 TTFT 실측:
    # 3-flash-preview+thinking끔 1.1초 / 3.5-flash는 무료 티어에서 4~93초라 보류)
    gemini: gemini-3-flash-preview
    anthropic: claude-haiku-4-5-20251001   # 잡담 티어 — 티어 분리(깊은 대화 승격)는 이후 Phase
    echo: echo

mouth:
  # TTS 교체는 vendor 한 줄(또는 실행 시 CLI --mouth) — 벤더별 설정·음색은 같은 이름의
  # 하위 섹션에서 읽는다. 두 벤더 섹션을 항상 공존시켜 두면 config 수정 없이 무중단 교체된다.
  #   fake       → 스피커·모델 없이 파이프라인 검증용
  #   supertonic → 고정 프리셋(F1 등), voice_id가 음색 이름
  #   gptsovits  → D3 확정. voice_id가 레퍼런스 wav 경로(ref_text와 짝)
  vendor: supertonic                # 한국어 기본. 실험은 config 건드리지 말고 CLI --mouth 로.
  voice:
    name: navi                      # 논리적 정체성 — 벤더 갈아껴도 같으면 "같은 목소리"
    speed: 1.0
  supertonic:                       # vendor가 supertonic일 때만 읽힘 → create_mouth kwargs
    voice_id: F1                    # 음색 프리셋 이름 — 파일 경로 아님
    model: supertonic-3
    lang: ko
    total_steps: 8
  gptsovits:                        # vendor가 gptsovits일 때만 읽힘
    voice_id: dataset/arisu/wavs/Arisu_Maid_LogIn_1.wav  # 레퍼런스 wav(톤·억양 제어, ref_text와 한 쌍)
    repo_path: C:\gptsovits         # ASCII 경로 (GPT-SoVITS repo)
    gpt_ckpt: voice_ref/arisu-e15.ckpt
    sovits_ckpt: voice_ref/arisu_e8_s352.pth
    ref_text: おかえりなさいませ、ご主人様！メイドのアリスに何でもお任せください。
    ref_lang: ja                    # 레퍼런스 음원 언어
    gen_lang: ja                    # 합성 출력 언어 (한국어 ref 확보 시 ko)

ear:
  # 웨이크워드(D7) — SLEEP에선 STT를 끄고 파형에서 호출어만 잡는다(arch 5.1·D16).
  # CLI --wakeword 줄 때만 청취축이 켜진다. 모델 없이도 데몬은 뜨고, --wakeword만 막힌다.
  wakeword:
    engine: vosk                # vosk(채택, 학습·키 불필요) | porcupine(보존, 콘솔 가입 필요)
    keywords: ["야 일어나"]      # 호출어 — 길고 또렷하게(짧으면 오수락↑). 여러 개 가능.
    active_timeout_ms: 30000    # 깨어난 뒤 이만큼 무음이면 다시 SLEEP
    vosk:
      # 한국어 모델 디렉터리 — alphacephei.com/vosk/models 에서 받아 secrets/에 압축 해제.
      # secrets/는 .gitignore. 작은 모델: vosk-model-small-ko-0.22
      model_path: secrets/vosk-model-small-ko
    porcupine:                  # 보존 — Picovoice 콘솔 가입(회사 이메일) 시에만. .env PICOVOICE_ACCESS_KEY
      keyword_path: secrets/navi_ko.ppn             # 콘솔 생성 한국어 .ppn
      model_path: secrets/porcupine_params_ko.pv    # 한국어 언어 모델 .pv
      sensitivity: 0.5

db:
  path: navi.db

memory:
  recent_turns: 20      # 단기기억 인출 턴 수 (장기기억은 Phase 4)

persona:
  # 인격 교체는 이 한 줄. navi.yaml = 나비 한국어 기본 페르소나.
  # supertonic.lang은 ko라 응답·음성 모두 한국어로 일치.
  card_path: personas/navi.yaml

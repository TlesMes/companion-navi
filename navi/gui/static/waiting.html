<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
  /* 팔레트 = index.html과 동일 토큰(전환 시 이질감 없게). 다크 기본, 라이트는 data-theme. */
  :root {
    --surface-1: #262521; --surface-2: #2d2b27; --surface-3: #34322d;
    --border: #3d3a34; --border-strong: #4a463f;
    --text-primary: #ece9e2; --text-secondary: #a8a396; --text-muted: #7a756a;
    --bg-accent: #402a20; --text-accent: #edad8e; --border-accent: #cc7351; --fill-accent: #d97757;
    --bg-warn: #4a2c15; --text-warn: #f0a868;
    --shadow: rgba(0,0,0,0.5); --radius: 8px; --font-mono: Consolas, monospace;
  }
  :root[data-theme="light"] {
    --surface-1: #f0eee6; --surface-2: #faf9f5; --surface-3: #ffffff;
    --border: #e7e4d9; --border-strong: #d8d4c7;
    --text-primary: #2b2a26; --text-secondary: #6d6a60; --text-muted: #9a9689;
    --bg-accent: #f6e9e1; --text-accent: #b34f2c; --border-accent: #d97757; --fill-accent: #d97757;
    --bg-warn: #f9e8d4; --text-warn: #ad661c;
    --shadow: rgba(70,60,45,0.16);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; height: 100vh; display: flex; flex-direction: column;
    background: var(--surface-2); color: var(--text-secondary);
    font-family: "Malgun Gothic", system-ui, sans-serif; font-size: 13px; user-select: none;
  }
  /* frameless 제목줄 — 헤더 전체 드래그, ✕만 제외 */
  header { flex: 0 0 34px; display: flex; align-items: center; padding: 0 4px 0 14px; }
  .title { flex: 1; font-size: 12px; color: var(--text-muted); }
  .x { width: 30px; height: 30px; border: 0; background: transparent; cursor: pointer;
       color: var(--text-muted); font-size: 15px; }
  .x:hover { color: var(--text-primary); }
  main { flex: 1; display: flex; flex-direction: column; align-items: center;
         justify-content: center; gap: 12px; padding: 0 20px 24px; }
  .lead { color: var(--text-secondary); }
  .lead b { color: var(--text-primary); font-weight: 600; }
  .sub { font-size: 11px; color: var(--text-muted); margin-top: -4px; text-align: center; line-height: 1.5; }
  #chips { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 4px; }
  .chip {
    display: flex; align-items: center; gap: 10px; width: 100%;
    padding: 11px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius);
    background: var(--surface-1); color: var(--text-primary); font-size: 13px; cursor: pointer;
    text-align: left; transition: background .15s, border-color .15s;
  }
  .chip:hover { border-color: var(--border-accent); background: var(--surface-3); }
  .chip .name { flex: 1; }
  .chip .go { color: var(--text-accent); font-size: 12px; }
  .chip.blocked { color: var(--text-muted); cursor: default; opacity: 0.85; }
  .chip.blocked:hover { border-color: var(--border-strong); background: var(--surface-1); }
  .chip.blocked .go { color: var(--text-muted); }
  /* 기동 중 — 칩 자리를 숨쉬는 점 + 캡션으로 교체 */
  #starting { display: none; flex-direction: column; align-items: center; gap: 12px; }
  #starting.show { display: flex; }
  #chips.hidden { display: none; }
  .dot { width: 46px; height: 46px; border-radius: 50%; background: var(--bg-accent);
         color: var(--text-accent); display: flex; align-items: center; justify-content: center;
         font-size: 18px; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 1; } }
  code { font-family: var(--font-mono); color: var(--text-muted); font-size: 12px; }
  #toast {
    position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%);
    background: var(--surface-1); border: 0.5px solid var(--border-strong);
    border-radius: 14px; padding: 8px 14px; font-size: 12px; color: var(--text-primary);
    opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 20;
    width: max-content; max-width: calc(100% - 32px);
    white-space: normal; overflow-wrap: break-word; line-height: 1.45; text-align: center;
    box-shadow: 0 6px 20px var(--shadow);
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<header class="pywebview-drag-region">
  <span class="title">나비</span>
  <button class="x" onclick="pywebview.api.close()">&#10005;</button>
</header>
<main>
  <p class="lead" id="lead">준비 상태를 확인하는 중…</p>
  <div id="chips"></div>
  <div id="starting">
    <div class="dot">나</div>
    <p class="lead"><b id="starting-name"></b> 기동 중…</p>
    <p class="sub">음성 모드는 TTS 웜업에 수십 초 걸립니다</p>
  </div>
  <p class="sub" id="hint"></p>
</main>
<div id="toast"></div>

<script>
const $ = (id) => document.getElementById(id);

function toast(msg, ms = 4200) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._h);
  toast._h = setTimeout(() => t.classList.remove("show"), ms);
}

// 테마 — index.html과 같은 규약(localStorage "navi-theme")이라 전환 시 안 튄다. 판정 없음.
(function applyTheme() {
  let saved = "dark";
  try { saved = localStorage.getItem("navi-theme") || "dark"; } catch (_) {}
  document.documentElement.setAttribute("data-theme", saved);
})();

let launching = false;

async function render() {
  let report;
  try {
    report = JSON.parse(await pywebview.api.preflight());
  } catch (e) {
    $("lead").textContent = "준비 상태를 읽지 못했어요";
    $("hint").textContent = "logs/navi.log를 확인하거나 프로젝트 루트에서 실행하세요";
    return;
  }
  $("lead").innerHTML = "어떤 <b>엔진</b>으로 깨울까?";
  $("hint").textContent = "";
  const box = $("chips");
  box.innerHTML = "";
  for (const eng of report.engines) {
    const chip = document.createElement("button");
    chip.className = "chip" + (eng.bootable ? "" : " blocked");
    chip.innerHTML = `<span class="name">${eng.label}</span>`
      + `<span class="go">${eng.bootable ? "▶" : "✕"}</span>`;
    chip.onclick = () => {
      if (launching) return;
      if (!eng.bootable) { toast(eng.reason || "지금은 이 엔진으로 못 떠요"); return; }
      launch(eng);
    };
    box.appendChild(chip);
  }
}

async function launch(eng) {
  launching = true;
  const r = await pywebview.api.launch(eng.id, eng.launch_persona);
  if (!r.ok) {
    launching = false;
    toast(r.reason || "기동에 실패했어요");
    return;
  }
  $("starting-name").textContent = eng.label;
  $("chips").classList.add("hidden");
  $("lead").style.display = "none";
  $("hint").style.display = "none";
  $("starting").classList.add("show");
  // 전환은 파이썬 폴러가 데몬을 감지해 실제 GUI로 load_url 할 때 일어난다(여기선 안 함).
}

// 파이썬 폴러가 데드라인 초과 시 부른다(부팅 실패 가시성). 칩을 되살려 재시도 가능하게.
window.naviLaunchTimedOut = function () {
  launching = false;
  $("starting").classList.remove("show");
  $("chips").classList.remove("hidden");
  $("lead").style.display = "";
  $("hint").style.display = "";
  toast("아직 응답이 없어요 — logs/navi.log를 확인하세요", 6000);
};

if (window.pywebview) render();
else window.addEventListener("pywebviewready", render);
</script>
</body>
</html>
